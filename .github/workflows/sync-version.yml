name: Sync Version– .NET SDK

on:
 repository_dispatch:
   types: [version_update]
   
permissions:
 contents: write
 
jobs:
 release:
   runs-on: ubuntu-latest
   
   steps:
     - name: Checkout repository
       uses: actions/checkout@v4
       with:
         token: ${{ secrets.PAT }}
         
     - name: Load version
       run: |
         VERSION="${{ github.event.client_payload.version }}"
         if [ -z "$VERSION" ]; then
           echo "Version is missing"
           exit 1
         fi
         
         if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
           echo "Invalid version format: $VERSION"
           exit 1
         fi
         
         echo "VERSION=$VERSION" >> $GITHUB_ENV
         echo "Using version $VERSION"
         
     - name: Compare current version
       run: |
         CURRENT_VERSION=$(jq -r '.dependencies["froala-wysiwyg-editor"]' demo-core/bower.json)
         
         if [ -z "$CURRENT_VERSION" ] || [ "$CURRENT_VERSION" = "null" ]; then
           echo "Could not read froala-wysiwyg-editor version from bower.json"
           exit 1
         fi
         
         echo "Current version: $CURRENT_VERSION"
         echo "Incoming version: $VERSION"
         
         if [ "$CURRENT_VERSION" = "$VERSION" ]; then
           echo "The version is already up to date. No changes needed."
           exit 0
         fi
         
         echo "New version detected. Continuing with release process."
         
     - name: Prepare release branch
       run: |
         BRANCH="release-v${VERSION}"
         echo "BRANCH=$BRANCH" >> $GITHUB_ENV
         git fetch origin
         
         if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
           git checkout "$BRANCH"
           git pull origin "$BRANCH"
         else
           git checkout -b "$BRANCH"
         fi
         
     - name: Update demo-core/bower.json
       run: |
         jq --arg VERSION "$VERSION" '.dependencies["froala-wysiwyg-editor"] = $VERSION' demo-core/bower.json > tmp.json
         mv tmp.json demo-core/bower.json
         
     - name: Update FroalaEditorSDK.nuspec
       run: |
         sed -i "s/<version>.*<\/version>/<version>${VERSION}<\/version>/g" src/FroalaEditorSDK.nuspec
         
     - name: Update src.csproj
       run: |
         sed -i "s/<Version>.*<\/Version>/<Version>${VERSION}<\/Version>/g" src/src.csproj
         
     - name: Commit changes
       run: |
         git config user.name "froala-travis-bot"
         git config user.email "froala_git_travis_bot@idera.com"
         git add demo-core/bower.json src/FroalaEditorSDK.nuspec src/src.csproj
         git commit -m "update SDK version to v${VERSION}" || echo "Nothing to commit"
         git push origin "$BRANCH"
         
     - name: Create Pull Request
       env:
         GH_TOKEN: ${{ secrets.PAT }}
         RELEASE_NOTES: ${{ github.event.client_payload.release_notes }}
       run: |
         git fetch origin master
         
         if git diff --quiet origin/master..."$BRANCH"; then
           echo "No commits between $BRANCH and master. Skipping PR creation."
           exit 0
         fi
         
         PR_BODY=$(printf \
           "release: yes\n\n## Release Notes (from primary repo)\n\n%s\n" \
           "$RELEASE_NOTES")
           
         gh pr create \
           --base master \
           --head "$BRANCH" \
           --title "Release v${VERSION}" \
           --body "$PR_BODY" \
           || echo "Pull request already exists"
